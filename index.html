<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem Digital</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #efefef;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            font-size: 18px;
        }

        h1 {
            font-size: 2.2em;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -1px;
            border-bottom: 2px solid #ff4757;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        h2 {
            font-size: 1.1em;
            color: #aaa;
            text-transform: uppercase;
            text-align: center;
        }

        input, button, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #121212;
            border: 1px solid #333;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
            line-height: 1.5;
        }

        button {
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-principal {
            background-color: #ff4757;
            border: 1px solid #ff4757;
            color: #fff;
            font-weight: 700;
        }

        .btn-principal:hover {
            background-color: #ff2a3d;
            border-color: #ff2a3d;
            opacity: 1;
        }

        .auth-container,
        .formulario-container {
            background-color: #1e1e1e;
            border: 1px dashed #555;
            padding: 20px;
            border-radius: 4px;
            max-width: 600px;
            margin: 0 auto 40px auto;
            transition: 0.3s;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tabs button {
            background-color: transparent;
            border: 1px solid #333;
            color: #888;
        }

        .auth-tabs button.ativo {
            background-color: #ff4757;
            border-color: #ff4757;
            color: #fff;
        }

        .usuario-barra {
            display: none;
            max-width: 600px;
            margin: 0 auto 25px auto;
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 15px;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .usuario-barra strong {
            color: #ff4757;
        }

        .usuario-barra button {
            margin-top: 12px;
            background-color: transparent;
            border: 1px solid #555;
            color: #aaa;
        }

        .usuario-barra button:hover {
            border-color: #ff4757;
            color: #ff4757;
            background-color: transparent;
        }

        .abas-garagem {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 20px auto;
        }

        .abas-garagem button {
            background-color: transparent;
            border: 1px solid #333;
            color: #888;
        }

        .abas-garagem button.ativo {
            background-color: #ff4757;
            border-color: #ff4757;
            color: #fff;
        }

        .conteudo-app {
            display: none;
        }

        .linha-inputs {
            display: flex;
            gap: 10px;
        }

        #btn-cancelar-edicao {
            display: none;
            background-color: transparent;
            border: 1px solid #555;
            color: #aaa;
        }

        #btn-cancelar-edicao:hover {
            border-color: #fff;
            color: #fff;
            background-color: transparent;
        }

        .filtros-container {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 15px;
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 20px auto;
            flex-wrap: wrap;
        }

        .filtros-container input,
        .filtros-container select {
            margin-bottom: 0;
            width: auto;
            flex-grow: 1;
        }

        .galeria {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .carro-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.25s;
        }

        .carro-card:hover {
            transform: translateY(-4px);
            border-color: #ff4757;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .carro-card h2 {
            font-size: 1.3em;
            font-weight: 900;
            letter-spacing: 1px;
            color: #fff;
        }

        .foto-carro {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid #333;
            background-color: #000;
            filter: brightness(0.9) contrast(1.1);
            transition: 0.3s;
        }

        .carro-card:hover .foto-carro {
            filter: brightness(1.05) contrast(1.15);
        }

        .card-info {
            padding: 14px;
            text-transform: uppercase;
        }

        .specs {
            margin: 4px 0;
            color: #ddd;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .titulo-card {
            position: relative;
        }

        .dono-badge {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7em;
        }

        .dono-link {
            color: #ff4757;
            cursor: pointer;
        }

        .dono-link:hover {
            text-decoration: underline;
        }

        .historia-projeto {
            margin-top: 12px;
            padding: 14px;
            border-left: 3px solid #ff4757;
            background-color: #181818;
            color: #bbb;
            font-size: 0.9em;
            line-height: 1.5;
            text-transform: none;
            letter-spacing: 0.2px;
        }

        .historia-projeto strong {
            display: block;
            color: #ff4757;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .destaque {
            color: #ff4757;
            font-weight: 900;
            font-size: 1.1em;
        }

        .acoes-principais {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 18px;
        }

        .barra-social {
            display: flex;
            gap: 10px;
        }

        .like-btn,
        .comment-btn {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            background: #181818;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.85em;
            transition: 0.2s;
        }

        .like-btn:hover {
            border-color: #ff4757;
            color: #ff4757;
            transform: scale(1.1);
        }

        .like-btn.curtido {
            background: rgba(255, 71, 87, 0.15);
            border-color: #ff4757;
            color: #ff4757;
        }

        .comment-btn:hover {
            transform: scale(1.1);
            background: #1a1a1a;
        }

        .btn-ver {
            width: auto;
            display: inline-block;
            border-radius: 6px;
            background: #ff4757;
            border: 1px solid #ff4757;
            color: #fff;
            cursor: pointer;
        }

        .btn-ver:hover {
            background: #ff2a3d;
            border-color: #ff2a3d;
            transform: scale(1.05);
        }

        .acoes-dono {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-editar,
        .btn-excluir {
            width: auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            margin: 0;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            font-size: 0.75em;
            cursor: pointer;
        }

        .btn-editar:hover {
            border-color: #fff;
            color: #fff;
        }

        .btn-excluir:hover {
            border-color: #ff4757;
            color: #ff4757;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background-color: rgba(0, 0, 0, 0.88);
            padding: 30px 15px;
            box-sizing: border-box;
        }

        .modal-content {
            position: relative;
            background-color: #111;
            border: 1px solid #333;
            max-width: 760px;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .modal-fechar {
            position: absolute;
            top: 12px;
            right: 14px;
            width: auto;
            background-color: rgba(0, 0, 0, 0.65);
            border: 1px solid #444;
            color: #fff;
            font-size: 1.2em;
            padding: 6px 12px;
            margin: 0;
            z-index: 2;
        }

        .modal-fechar:hover {
            background-color: #ff4757;
            border-color: #ff4757;
        }

        .modal-img {
            width: 100%;
            height: 430px;
            object-fit: cover;
            display: block;
            background-color: #000;
        }

        .modal-sem-foto {
            height: 330px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            background-color: #000;
            font-weight: bold;
            text-transform: uppercase;
        }

        .modal-info {
            padding: 25px;
            text-transform: uppercase;
        }

        .modal-info h2 {
            text-align: left;
            color: #fff;
            font-size: 1.8em;
            margin: 0 0 15px 0;
            border-left: 4px solid #ff4757;
            padding-left: 12px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .modal-item {
            background-color: #181818;
            border: 1px solid #262626;
            padding: 12px;
        }

        .modal-item span {
            display: block;
            color: #666;
            font-size: 0.72em;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .modal-item strong {
            color: #eee;
            font-size: 1em;
        }

        .comentarios-container {
            margin-top: 20px;
        }

        #input-comentario {
            margin-top: 10px;
            text-transform: none;
        }

        .comentario-item {
            padding: 12px;
            border: 1px solid #222;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #151515;
            transition: 0.2s;
        }

        .comentario-item:hover {
            border-color: #333;
        }

        .comentario-topo {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .comentario-autor {
            color: #ff4757;
            font-weight: bold;
            cursor: pointer;
        }

        .comentario-autor:hover {
            text-decoration: underline;
        }

        .comentario-data {
            color: #666;
            font-size: 0.75em;
        }

        .comentario-texto {
            color: #ccc;
            line-height: 1.4;
        }

        .comentarios-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .comentarios-header h3 {
            margin: 0;
            font-size: 1.2em;
            color: #fff;
        }



        @keyframes likePop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .like-btn.animando {
            animation: likePop 0.3s ease;
        }

        @keyframes countUp {
            0%   { transform: translateY(5px); opacity: 0.5; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .like-btn.animando span {
            animation: countUp 0.3s ease;
        }

        .like-particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #ff4757;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            animation: explode 0.6s ease forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0.5);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .linha-inputs {
                flex-direction: column;
                gap: 0;
            }

            body {
                padding: 25px 12px;
            }

            .modal {
                padding: 15px 10px;
            }

            .modal-img {
                height: 260px;
            }

            .modal-grid {
                grid-template-columns: 1fr;
            }

            .auth-tabs,
            .abas-garagem {
                flex-direction: column;
                gap: 0;
            }

            .titulo-card h2 {
                padding-right: 0;
                font-size: 1.1em;
                margin: 0;
                font-weight: 600;
            }

            .dono-badge {
                position: static;
                transform: none;
                margin: 8px 0 0 10px;
            }
        }

            .btn-comentar {
                background: #ff4757;
                border: 1px solid #ff4757;
                color: #fff;
                border-radius: 8px;
                font-weight: bold;
                margin-top: 8px;
            }

            .btn-comentar:hover {
                background: #ff2a3d;
                border-color: #ff2a3d;
                transform: scale(1.03);
            }

            .comentarios-like {
                padding: 6px 12px;
                border-radius: 20px;
                background: #181818;
                border: 1px solid #333;
                color: #aaa;
                font-size: 0.8em;
                cursor: pointer;
                transition: 0.2s;
            }

            .comentarios-like:hover {
                border-color: #ff4757;
                color: #ff4757;
                background: #1a1a1a;
                transform: scale(1.05);
            }

            .comentarios-like.curtido {
                background: rgba(255, 71, 87, 0.12);
                border-color: #ff4757;
                color: #ff4757;
            }

            .modal .dono-link {
                color: #ff4757;
            }

            .modal .dono-link:hover {
                text-decoration: underline;
            }

            .perfil-container {
                padding: 20px;
            }

            .perfil-header {
                text-align: center;
                margin-bottom: 20px;
            }

            .perfil-header h2 {
                margin: 0;
                font-size: 1.8em;
            }

            .perfil-stats {
                display: flex;
                justify-content: center;
                margin-top: 10px;
            }

            .perfil-stat {
                text-align: center;
            }

            .perfil-stat strong {
                display: block;
                font-size: 1.4em;
                color: #ff4757;
            }

            .perfil-stat span {
                font-size: 0.8em;
                color: #aaa;
            }

            .perfil-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .perfil-card {
                background: #151515;
                border: 1px solid #222;
                border-radius: 8px;
                overflow: hidden;
                cursor: pointer;
                transition: 0.2s;
            }

            .perfil-card:hover {
                border-color: #ff4757;
                transform: scale(1.02);
            }

            .perfil-card img {
                width: 100%;
                height: 120px;
                object-fit: cover;
            }

            .perfil-sem-foto {
                height: 120px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #333;
            }

            .perfil-card-info {
                padding: 8px;
            }

            .perfil-card-info strong {
                display: block;
                font-size: 1em;
                font-weight: 700;
                color: #fff;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .perfil-card-info span {
                font-size: 0.75em;
                color: #888;
                text-transform: uppercase;
            }

    </style>
</head>
<body>

    <h1>Garagem Digital</h1>

    <div class="auth-container" id="auth-container">
        <div class="auth-tabs">
            <button type="button" id="tab-login" class="ativo" onclick="mostrarLogin()">Login</button>
            <button type="button" id="tab-cadastro" onclick="mostrarCadastro()">Cadastro</button>
        </div>

        <div id="area-login">
            <h2>Entrar na Garagem</h2>

            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-senha" placeholder="Senha">

            <button type="button" class="btn-principal" onclick="loginUsuario()">Entrar</button>
        </div>

        <div id="area-cadastro" style="display: none;">
            <h2>Criar Conta</h2>

            <input type="text" id="cadastro-nome" placeholder="Nome">
            <input type="email" id="cadastro-email" placeholder="Email">
            <input type="password" id="cadastro-senha" placeholder="Senha">

            <button type="button" class="btn-principal" onclick="cadastrarUsuario()">Cadastrar</button>
        </div>
    </div>

    <div class="usuario-barra" id="usuario-barra">
        Logado como <strong id="usuario-nome"></strong>
        <button type="button" onclick="sair()">Sair</button>
    </div>

    <div class="conteudo-app" id="conteudo-app">
        <div class="formulario-container" id="container-form">
            <h2 id="titulo-form">Registrar Novo Projeto</h2>

            <form id="form-carro">
                <input type="hidden" id="input-id" value="">

                <input type="text" id="input-dono" placeholder="Nome do Dono" required>
                <input type="text" id="input-modelo" placeholder="Modelo do Carro" required>

                <div class="linha-inputs">
                    <input type="number" id="input-ano" placeholder="Ano" required>
                    <input type="text" id="input-cor" placeholder="Cor" required>
                </div>

                <input type="text" id="input-placa" placeholder="Placa (opcional)">

                <textarea id="input-historia" placeholder="História do projeto, modificações, proposta visual..."></textarea>

                <div class="linha-inputs">
                    <select id="input-suspensao" required>
                        <option value="" disabled selected hidden>SELECIONE A SUSPENSÃO</option>
                        <option value="Fixa">Fixa</option>
                        <option value="Ar">Ar</option>
                        <option value="Rosca">Rosca</option>
                    </select>

                    <input type="number" id="input-aro" placeholder="Aro" required>
                </div>

                <label style="font-size: 0.7em; color: #555; text-transform: uppercase;">
                    Foto da Máquina:
                </label>

                <input type="file" id="input-foto" accept=".png,.jpg,.jpeg,.webp">

                <button type="submit" id="btn-submit" class="btn-principal">Estacionar na Garagem</button>
                <button type="button" id="btn-cancelar-edicao" onclick="resetarFormulario()">Cancelar edição</button>
            </form>
        </div>

        <div class="abas-garagem">
            <button type="button" id="aba-todos" class="ativo" onclick="mostrarTodosProjetos()">
                Todos os projetos
            </button>

            <button type="button" id="aba-meus" onclick="mostrarMeusProjetos()">
                Meus projetos
            </button>
        </div>

        <div class="filtros-container">
            <input type="text" id="filtro-modelo" placeholder="Modelo">

            <select id="filtro-suspensao">
                <option value="">TODAS AS SUSPENSÕES</option>
                <option value="Fixa">Fixa</option>
                <option value="Ar">Ar</option>
                <option value="Rosca">Rosca</option>
            </select>

            <input type="number" id="filtro-aro" placeholder="Aro" style="width: 70px;">

            <button type="button" onclick="carregarGaragem()" style="width: auto; padding: 0 15px;">
                Buscar
            </button>
        </div>

        <div class="galeria" id="lista-carros"></div>
    </div>

    <div id="modal-projeto" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000';
        let todosCarros = [];
        let modoGaragem = "todos";

        function getUsuarioLogado() {
            const usuario = localStorage.getItem('usuarioLogado');

            if (!usuario) {
                return null;
            }

            return JSON.parse(usuario);
        }

        function usuarioEDono(carro) {
            const usuario = getUsuarioLogado();

            if (!usuario) {
                return false;
            }

            return String(carro.usuario_id) === String(usuario.id);
        }

        function mostrarTodosProjetos() {
            modoGaragem = "todos";

            document.getElementById('aba-todos').classList.add('ativo');
            document.getElementById('aba-meus').classList.remove('ativo');

            carregarGaragem();
        }

        function mostrarMeusProjetos() {
            modoGaragem = "meus";

            document.getElementById('aba-meus').classList.add('ativo');
            document.getElementById('aba-todos').classList.remove('ativo');

            carregarGaragem();
        }

        function atualizarTelaUsuario() {
            const usuario = getUsuarioLogado();

            if (usuario) {
                document.getElementById('auth-container').style.display = "none";
                document.getElementById('usuario-barra').style.display = "block";
                document.getElementById('conteudo-app').style.display = "block";
                document.getElementById('usuario-nome').innerText = usuario.nome;
                document.getElementById('input-dono').value = usuario.nome;

                carregarGaragem();
            } else {
                document.getElementById('auth-container').style.display = "block";
                document.getElementById('usuario-barra').style.display = "none";
                document.getElementById('conteudo-app').style.display = "none";
            }
        }

        function mostrarLogin() {
            document.getElementById('area-login').style.display = "block";
            document.getElementById('area-cadastro').style.display = "none";
            document.getElementById('tab-login').classList.add('ativo');
            document.getElementById('tab-cadastro').classList.remove('ativo');
        }

        function mostrarCadastro() {
            document.getElementById('area-login').style.display = "none";
            document.getElementById('area-cadastro').style.display = "block";
            document.getElementById('tab-login').classList.remove('ativo');
            document.getElementById('tab-cadastro').classList.add('ativo');
        }

        async function cadastrarUsuario() {
            const nome = document.getElementById('cadastro-nome').value.trim();
            const email = document.getElementById('cadastro-email').value.trim();
            const senha = document.getElementById('cadastro-senha').value.trim();

            if (!nome || !email || !senha) {
                alert("Preencha nome, email e senha.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/usuarios/cadastro`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome, email, senha })
                });

                const resposta = await res.json();

                if (res.ok) {
                    alert("Conta criada com sucesso! Agora faça login.");
                    mostrarLogin();
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-senha').value = "";
                } else {
                    alert("Erro: " + (resposta.erro || "Não foi possível criar a conta."));
                }

            } catch (error) {
                alert("Erro de conexão com o servidor.");
                console.error(error);
            }
        }

        async function loginUsuario() {
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value.trim();

            if (!email || !senha) {
                alert("Preencha email e senha.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/usuarios/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, senha })
                });

                const resposta = await res.json();

                if (res.ok) {
                    localStorage.setItem('usuarioLogado', JSON.stringify(resposta.usuario));
                    alert("Login realizado com sucesso!");
                    atualizarTelaUsuario();
                } else {
                    alert("Erro: " + (resposta.erro || "Não foi possível fazer login."));
                }

            } catch (error) {
                alert("Erro de conexão com o servidor.");
                console.error(error);
            }
        }

        function sair() {
            localStorage.removeItem('usuarioLogado');
            resetarFormulario();
            atualizarTelaUsuario();
        }

        async function carregarGaragem() {
            const mod = document.getElementById('filtro-modelo').value;
            const sus = document.getElementById('filtro-suspensao').value;
            const aro = document.getElementById('filtro-aro').value;

            const params = new URLSearchParams();

            if (mod) params.append('modelo', mod);
            if (sus) params.append('suspensao', sus);
            if (aro) params.append('aro', aro);

            const usuario = getUsuarioLogado();

            if (usuario) {
                params.append('usuario_id', usuario.id);
            }

            if (modoGaragem === "meus") {
                params.append('apenas_meus', '1');
            }

            try {
                const res = await fetch(`${API_URL}/carros?${params.toString()}`);
                todosCarros = await res.json();

                const galeria = document.getElementById('lista-carros');
                galeria.innerHTML = '';

                if (!Array.isArray(todosCarros) || todosCarros.length === 0) {
                    galeria.innerHTML = `
                        <div style="text-align:center; color:#666; padding: 30px;">
                            ${modoGaragem === "meus" ? "Você ainda não cadastrou nenhum projeto." : "Nenhum projeto encontrado na garagem."}
                        </div>
                    `;
                    return;
                }

                let carrosParaExibir = todosCarros;

                if (modoGaragem === "meus" && usuario) {
                    carrosParaExibir = todosCarros.filter(carro => String(carro.usuario_id) === String(usuario.id));
                }

                if (carrosParaExibir.length === 0) {
                    galeria.innerHTML = `
                        <div style="text-align:center; color:#666; padding: 30px;">
                            Você ainda não cadastrou nenhum projeto.
                        </div>
                    `;
                    return;
                }

                carrosParaExibir.forEach(carro => {
                    const img = carro.foto_url ? `${API_URL}/uploads/${carro.foto_url}` : '';
                    const card = document.createElement('div');
                    const dono = usuarioEDono(carro);
                    const totalCurtidas = carro.total_curtidas || 0;
                    const curtido = estaCurtido(carro.curtido_pelo_usuario);

                    card.className = 'carro-card';

                    card.innerHTML = `
                        ${img ? `<img src="${img}" class="foto-carro">` : '<div class="foto-carro" style="display:flex;align-items:center;justify-content:center;color:#333">SEM FOTO</div>'}

                        <div class="card-info">
                            <div class="titulo-card">
                                <h2 style="margin:0">${carro.modelo} (${carro.ano})</h2>
                                ${dono ? '<span class="dono-badge">Seu projeto</span>' : ''}
                            </div>

                            <p class="specs">
                                Proprietário:
                                ${carro.usuario_id
                                    ? `<span class="dono-link" data-id="${carro.usuario_id}">
                                        ${carro.nome_dono}
                                    </span>`
                                    : '---'}
                            </p>

                            <p class="specs">Cor: ${carro.cor}</p>
                            <p class="specs">Placa: ${carro.placa || '---'}</p>

                            <p class="specs">
                                <span style="display:block; margin-top:12px; color:#666; font-size:0.75em; font-weight:bold;">
                                    FICHA TÉCNICA:
                                </span>

                                <span class="destaque">
                                    ARO ${carro.aro_roda} | SUSPENSÃO ${carro.tipo_suspensao}
                                </span>
                            </p>

                            ${carro.historia ? `
                                <div class="historia-projeto">
                                    <strong>História do projeto</strong>
                                    ${carro.historia}
                                </div>
                            ` : ''}

                            <div class="acoes-principais">
                                <div class="barra-social">
                                    <span class="like-btn ${curtido ? 'curtido' : ''}">
                                        👍 <span>${totalCurtidas}</span>
                                    </span>

                                    <span class="comment-btn">
                                        💬 ${carro.total_comentarios || 0}
                                    </span>
                                </div>

                                <button type="button" class="btn-ver">Ver projeto</button>
                            </div>

                            ${dono ? `
                                <div class="acoes-dono">
                                    <button type="button" class="btn-editar">Editar</button>
                                    <button type="button" class="btn-excluir">Remover</button>
                                </div>
                            ` : ''}
                        </div>
                    `;

                    const donoLink = card.querySelector('.dono-link');

                    if (donoLink) {
                        donoLink.onclick = () => abrirPerfil(donoLink.dataset.id);
                    }

                    card.querySelector('.btn-ver').onclick = () => abrirModalProjeto(carro);

                    const likeBtn = card.querySelector('.like-btn');

                    likeBtn.onclick = () => {
                        alternarCurtida(carro.id);

                        likeBtn.classList.add('animando');
                        criarParticulas(likeBtn);

                        if (navigator.vibrate) {
                            navigator.vibrate(10);
                        }

                        setTimeout(() => {
                            likeBtn.classList.remove('animando');
                        }, 300);
                    };

                    card.querySelector('.comment-btn').onclick = () => abrirComentariosProjeto(carro);

                    if (dono) {
                        card.querySelector('.btn-editar').onclick = () => prepararEdicao(carro);
                        card.querySelector('.btn-excluir').onclick = () => solicitarExclusao(carro.id);
                    }

                    galeria.appendChild(card);
                });

            } catch (error) {
                alert("Erro ao carregar a garagem. Verifique se o Flask está rodando.");
                console.error(error);
            }
        }

        async function alternarCurtida(carroId) {
            const usuario = getUsuarioLogado();

            if (!usuario) {
                alert("Faça login para curtir um projeto.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/carros/${carroId}/curtir`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ usuario_id: usuario.id })
                });

                let resposta = {};

                try {
                    resposta = await res.json();
                } catch {
                    resposta = {};
                }

                if (res.ok) {
                    carregarGaragem();
                } else {
                    alert("Erro: " + (resposta.erro || "Não foi possível atualizar a curtida."));
                }

            } catch (error) {
                alert("Erro de conexão com o servidor.");
                console.error(error);
            }
        }

        function abrirModalProjeto(carro, scrollManter = null) {
            const modal = document.getElementById('modal-projeto');
            const modalContent = document.getElementById('modal-content');

            modal.style.display = "block";
            document.body.style.overflow = "hidden";

            const img = carro.foto_url ? `${API_URL}/uploads/${carro.foto_url}` : '';
            const totalCurtidas = carro.total_curtidas || 0;
            const curtido = estaCurtido(carro.curtido_pelo_usuario);

            modalContent.innerHTML = `
                <button type="button" class="modal-fechar" onclick="fecharModalProjeto()">X</button>

                ${img
                    ? `<img src="${img}" class="modal-img">`
                    : '<div class="modal-sem-foto">Sem foto</div>'
                }

                <div class="modal-info">
                    <h2>${carro.modelo} (${carro.ano})</h2>

                    <div class="modal-grid">
                        <div class="modal-item">
                            <span>Proprietário</span>
                            ${carro.usuario_id
                                ? `<strong class="dono-link" onclick="abrirPerfil(${carro.usuario_id})">
                                    ${carro.nome_dono}
                                </strong>`
                                : `<strong>${carro.nome_dono || '---'}</strong>`
                            }
                        </div>

                        <div class="modal-item">
                            <span>Cor</span>
                            <strong>${carro.cor}</strong>
                        </div>

                        <div class="modal-item">
                            <span>Placa</span>
                            <strong>${carro.placa || '---'}</strong>
                        </div>

                        <div class="modal-item">
                            <span>Aro</span>
                            <strong>${carro.aro_roda}</strong>
                        </div>

                        <div class="modal-item">
                            <span>Suspensão</span>
                            <strong>${carro.tipo_suspensao}</strong>
                        </div>

                        <div class="modal-item">
                            <span>Ano</span>
                            <strong>${carro.ano}</strong>
                        </div>
                    </div>

                    ${carro.historia ? `
                        <div class="historia-projeto">
                            <strong>História do projeto</strong>
                            ${carro.historia}
                        </div>
                    ` : ''}

                    <div class="comentarios-container" id="comentarios-container">
                        <div class="comentarios-header">
                            <h3>Comentários</h3>

                            <span class="comentarios-like ${curtido ? 'curtido' : ''}" onclick="curtirPeloModal(${carro.id})">
                                👍 ${totalCurtidas} ${totalCurtidas === 1 ? 'curtida' : 'curtidas'}
                            </span>
                        </div>

                        <div id="lista-comentarios" style="margin-top:10px;"></div>

                        <textarea id="input-comentario" placeholder="Escreva um comentário..."></textarea>
                        <button type="button" class="btn-comentar" onclick="enviarComentario(${carro.id})">
                            Comentar
                        </button>
                    </div>
                </div>
            `;

            setTimeout(() => {
                if (scrollManter !== null) {
                    modal.scrollTop = scrollManter;
                } else {
                    modal.scrollTop = 0;
                }

                modalContent.scrollTop = 0;
            }, 0);

            setTimeout(() => carregarComentarios(carro.id), 100);
        }

        function fecharModalProjeto() {
            const modal = document.getElementById('modal-projeto');

            modal.style.display = "none";
            document.body.style.overflow = "";
        }

        document.getElementById('modal-projeto').addEventListener('click', function(e) {
            if (e.target.id === 'modal-projeto') {
                fecharModalProjeto();
            }
        });

        function prepararEdicao(carro) {
            if (!usuarioEDono(carro)) {
                alert("Você não tem permissão para editar este projeto.");
                return;
            }

            document.getElementById('input-id').value = carro.id;
            document.getElementById('input-dono').value = carro.nome_dono;
            document.getElementById('input-modelo').value = carro.modelo;
            document.getElementById('input-ano').value = carro.ano;
            document.getElementById('input-cor').value = carro.cor;
            document.getElementById('input-placa').value = carro.placa || '';
            document.getElementById('input-historia').value = carro.historia || '';
            document.getElementById('input-suspensao').value = carro.tipo_suspensao;
            document.getElementById('input-aro').value = carro.aro_roda;

            document.getElementById('btn-submit').innerText = "Confirmar Alterações";
            document.getElementById('btn-cancelar-edicao').style.display = "block";

            document.getElementById('titulo-form').innerText = "Editando Projeto";
            document.getElementById('container-form').style.borderColor = "#ff4757";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('form-carro').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usuario = getUsuarioLogado();

            if (!usuario) {
                alert("Faça login para cadastrar um projeto.");
                return;
            }

            const btnSubmit = document.getElementById('btn-submit');
            const id = document.getElementById('input-id').value;

            const formData = new FormData();

            formData.append('usuario_id', usuario.id);
            formData.append('nome_dono', document.getElementById('input-dono').value.trim());
            formData.append('modelo', document.getElementById('input-modelo').value.trim());
            formData.append('ano', document.getElementById('input-ano').value);
            formData.append('cor', document.getElementById('input-cor').value.trim());
            formData.append('placa', document.getElementById('input-placa').value.trim());
            formData.append('historia', document.getElementById('input-historia').value.trim());
            formData.append('tipo_suspensao', document.getElementById('input-suspensao').value);
            formData.append('aro_roda', document.getElementById('input-aro').value);

            const foto = document.getElementById('input-foto').files[0];

            if (foto) {
                const formatosPermitidos = ['image/png', 'image/jpeg', 'image/webp'];
                const extensoesPermitidas = ['png', 'jpg', 'jpeg', 'webp'];
                const extensao = foto.name.split('.').pop().toLowerCase();

                if (
                    !formatosPermitidos.includes(foto.type) ||
                    !extensoesPermitidas.includes(extensao)
                ) {
                    alert("Formato de imagem inválido. Use PNG, JPG, JPEG ou WEBP.");
                    return;
                }

                formData.append('foto', foto);
            }

            const url = id ? `${API_URL}/carros/${id}` : `${API_URL}/carros`;
            const metodo = id ? 'PUT' : 'POST';

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerText = id ? "Salvando alterações..." : "Estacionando...";

                const res = await fetch(url, {
                    method: metodo,
                    body: formData
                });

                let resposta = {};

                try {
                    resposta = await res.json();
                } catch {
                    resposta = {};
                }

                if (res.ok) {
                    alert("Operação realizada com sucesso!");
                    resetarFormulario();
                    carregarGaragem();
                } else {
                    alert("Erro: " + (resposta.erro || "Não foi possível concluir a operação."));
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = id ? "Confirmar Alterações" : "Estacionar na Garagem";
                }

            } catch (error) {
                alert("Erro de conexão com o servidor. Verifique se o Flask está rodando.");
                console.error(error);

                btnSubmit.disabled = false;
                btnSubmit.innerText = id ? "Confirmar Alterações" : "Estacionar na Garagem";
            }
        });

        function resetarFormulario() {
            const usuario = getUsuarioLogado();

            document.getElementById('form-carro').reset();

            document.getElementById('input-id').value = "";
            document.getElementById('input-historia').value = "";

            if (usuario) {
                document.getElementById('input-dono').value = usuario.nome;
            }

            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-submit').innerText = "Estacionar na Garagem";
            document.getElementById('btn-cancelar-edicao').style.display = "none";

            document.getElementById('titulo-form').innerText = "Registrar Novo Projeto";
            document.getElementById('container-form').style.borderColor = "#555";

            document.getElementById('input-suspensao').selectedIndex = 0;
        }

        async function solicitarExclusao(id) {
            const usuario = getUsuarioLogado();

            if (!usuario) {
                alert("Faça login novamente.");
                return;
            }

            const confirmar = confirm("Tem certeza que deseja remover este projeto?");

            if (!confirmar) {
                return;
            }

            try {
                const res = await fetch(`${API_URL}/carros/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        usuario_id: usuario.id
                    })
                });

                let resposta = {};

                try {
                    resposta = await res.json();
                } catch {
                    resposta = {};
                }

                if (res.ok) {
                    alert("Projeto removido com sucesso!");
                    carregarGaragem();
                } else {
                    alert("Erro: " + (resposta.erro || "Não foi possível remover o projeto."));
                }

            } catch (error) {
                alert("Erro de conexão com o servidor. Verifique se o Flask está rodando.");
                console.error(error);
            }
        }

        async function carregarComentarios(carroId) {
            try {
                const res = await fetch(`${API_URL}/carros/${carroId}/comentarios`);
                const comentarios = await res.json();

                const lista = document.getElementById('lista-comentarios');
                lista.innerHTML = '';

                if (!comentarios.length) {
                    lista.innerHTML = `<div style="color:#666;">Nenhum comentário ainda.</div>`;
                    return;
                }

                comentarios.forEach(c => {
                    const div = document.createElement('div');

                    div.innerHTML = `
                        <div class="comentario-item">
                            <div class="comentario-topo">
                                ${c.usuario_id
                                    ? `<span class="comentario-autor" onclick="abrirPerfil(${c.usuario_id})">
                                        ${c.nome_usuario}
                                    </span>`
                                    : `<span class="comentario-autor">
                                        ${c.nome_usuario}
                                    </span>`
                                }

                                <span class="comentario-data">
                                    ${new Date(c.criado_em).toLocaleString()}
                                </span>
                            </div>

                            <div class="comentario-texto">
                                ${c.texto}
                            </div>
                        </div>
                    `;

                    lista.appendChild(div);
                });

            } catch (error) {
                console.error(error);
            }
        }

        async function enviarComentario(carroId) {
            const usuario = getUsuarioLogado();

            if (!usuario) {
                alert("Faça login para comentar.");
                return;
            }

            const input = document.getElementById('input-comentario');
            const texto = input.value.trim();

            if (!texto) {
                alert("Digite um comentário.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/carros/${carroId}/comentarios`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        usuario_id: usuario.id,
                        texto: texto
                    })
                });

                if (res.ok) {
                    input.value = '';
                    carregarComentarios(carroId);
                    carregarGaragem();
                } else {
                    const erro = await res.json();
                    alert(erro.erro || "Erro ao comentar.");
                }

            } catch (error) {
                console.error(error);
                alert("Erro de conexão.");
            }
        }

        async function abrirPerfil(usuarioId) {
            const modal = document.getElementById('modal-projeto');
            const modalContent = document.getElementById('modal-content');

            modal.style.display = "block";
            document.body.style.overflow = "hidden";

            try {
                const resUser = await fetch(`${API_URL}/usuarios/${usuarioId}`);

                if (!resUser.ok) {
                    alert("Perfil não disponível.");
                    return;
                }

                const usuario = await resUser.json();

                const resCarros = await fetch(`${API_URL}/usuarios/${usuarioId}/carros`);
                const carros = await resCarros.json();

                modalContent.innerHTML = `
                    <button class="modal-fechar" onclick="fecharModalProjeto()">X</button>

                    <div class="perfil-container">

                        <div class="perfil-header">
                            <h2>${usuario.nome}</h2>

                            <div class="perfil-stats">
                                <div class="perfil-stat">
                                    <strong>${usuario.total_projetos}</strong>
                                    <span>Projetos</span>
                                </div>
                            </div>
                        </div>

                        <div class="perfil-grid">
                            ${carros.length === 0
                                ? '<p style="color:#666;">Nenhum projeto cadastrado.</p>'
                                : carros.map(c => `
                                    <div class="perfil-card" onclick="abrirProjetoPorId(${c.id})">

                                        ${c.foto_url
                                            ? `<img src="${API_URL}/uploads/${c.foto_url}">`
                                            : `<div class="perfil-sem-foto">SEM FOTO</div>`
                                        }

                                        <div class="perfil-card-info">
                                            <strong>${c.modelo}</strong>
                                            <span>${c.ano}</span>
                                        </div>

                                    </div>
                                `).join('')
                            }
                        </div>

                    </div>
                `;

                setTimeout(() => {
                    modal.scrollTop = 0;
                    modalContent.scrollTop = 0;
                }, 0);

            } catch (error) {
                console.error(error);
                alert("Erro ao carregar perfil.");
            }
        }

        async function abrirProjetoPorId(id) {
            const carro = todosCarros.find(c => String(c.id) === String(id));

            if (carro) {
                abrirModalProjeto(carro);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/carros`);
                const lista = await res.json();

                const encontrado = lista.find(c => String(c.id) === String(id));

                if (encontrado) {
                    abrirModalProjeto(encontrado);
                } else {
                    alert("Projeto não encontrado.");
                }
            } catch (error) {
                console.error(error);
                alert("Erro ao abrir projeto.");
            }
        }

        function abrirComentariosProjeto(carro) {
            abrirModalProjeto(carro);

            setTimeout(() => {
                const comentarios = document.getElementById('comentarios-container');

                if (comentarios) {
                    comentarios.scrollIntoView({ behavior: 'smooth' });
                }
            }, 200);
        }

        function criarParticulas(element) {
            const rect = element.getBoundingClientRect();

            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'like-particle';

                const x = (Math.random() - 0.5) * 60 + 'px';
                const y = (Math.random() - 0.5) * 60 + 'px';

                p.style.left = (rect.left + rect.width / 2) + 'px';
                p.style.top = (rect.top + rect.height / 2) + 'px';

                p.style.setProperty('--x', x);
                p.style.setProperty('--y', y);

                document.body.appendChild(p);

                setTimeout(() => p.remove(), 600);
            }
        }

       async function curtirPeloModal(carroId) {
            await alternarCurtida(carroId);

            await carregarGaragem();

            const atualizado = todosCarros.find(c => String(c.id) === String(carroId));

            if (!atualizado) return;

            const blocoCurtidas = document.querySelector('.comentarios-like');

            if (blocoCurtidas) {
                const total = atualizado.total_curtidas || 0;

                blocoCurtidas.innerHTML = `
                    👍 ${total} ${total === 1 ? 'curtida' : 'curtidas'}
                `;

                // 🔥 FALTA ISSO AQUI
                const curtido = estaCurtido(atualizado.curtido_pelo_usuario);

                blocoCurtidas.classList.toggle('curtido', curtido);
            }
        }

        function estaCurtido(valor) {
            return valor === true || valor === 1 || valor === "1";
        }

        atualizarTelaUsuario();
    </script>
</body>
</html>
